<script>
// Runtime img-src rewriter: maps "assets/X.png" → window.__resources[id]
// Works without editing any JSX — observes the DOM as React renders.
(function(){
  var MAP = {
    "assets/journey.png": "journey",
    "assets/amaka-passport.png": "amakaPassport",
    "assets/passport-cover.png": "passportCover",
    "assets/logo-haaraya-literacy.png": "logoLiteracy",
    "assets/logo-haaraya-education.png": "logoEducation",
    "assets/logo-hafwas.png": "logoHafwas",
    "assets/logo-soundables.png": "logoSoundables",
    "assets/logo-soundables-plus.png": "logoSoundablesPlus",
    "assets/logo-tafiya.png": "logoTafiya",
    "assets/logo-poetry.png": "logoPoetry",
    "assets/logo-folktales.png": "logoFolktales",
    "assets/logo-tafiya-stamina.png": "logoStamina",
    "assets/logo-tafiya-duniya.png": "logoDuniya",
    "assets/card-hafwas.png": "cardHafwas",
    "assets/card-soundables.png": "cardSoundables",
    "assets/card-soundables-plus.png": "cardSoundablesPlus",
    "assets/card-tafiya-fiction.png": "cardTafiyaFiction",
    "assets/card-tafiya-nonfiction.png": "cardTafiyaNonfiction",
    "assets/card-folktale.png": "cardFolktale",
    "assets/card-poetry.png": "cardPoetry",
    "assets/card-tafiya-duniya.png": "cardDuniya",
    "assets/card-stamina-fiction.png": "cardStaminaFiction",
    "assets/card-stamina-nonfiction.png": "cardStaminaNonfiction",
    "assets/logo-tafiya-fiction.png": "logoTafiyaFiction",
    "assets/logo-tafiya-nonfiction.png": "logoTafiyaNonfiction",
    "assets/logo-tafiya-stamina-fiction.png": "logoStaminaFiction",
    "assets/logo-tafiya-stamina-nonfiction.png": "logoStaminaNonfiction",
    "assets/passport-cover-trim.png": "passportCoverTrim",
    "assets/book-notstarted.png": "bookNotStarted",
    "assets/book-reading.png": "bookReading",
    "assets/book-complete.png": "bookComplete"
  };
  for (var i = 1; i <= 12; i++) MAP["assets/stamp-l" + i + ".png"] = "stampL" + i;

  function resolve(src) {
    if (!src || !window.__resources) return null;
    if (MAP[src] && window.__resources[MAP[src]]) return window.__resources[MAP[src]];
    return null;
  }
  function rewriteImg(img) {
    var s = img.getAttribute("src");
    var url = resolve(s);
    if (url) img.setAttribute("src", url);
  }
  function scanAll(root) {
    if (!root || !root.querySelectorAll) return;
    var imgs = root.querySelectorAll("img");
    for (var i = 0; i < imgs.length; i++) rewriteImg(imgs[i]);
  }
  function start() {
    scanAll(document);
    var obs = new MutationObserver(function(muts){
      for (var i = 0; i < muts.length; i++) {
        var m = muts[i];
        if (m.type === "attributes" && m.target.tagName === "IMG") {
          rewriteImg(m.target);
          continue;
        }
        for (var j = 0; j < m.addedNodes.length; j++) {
          var n = m.addedNodes[j];
          if (n.nodeType !== 1) continue;
          if (n.tagName === "IMG") rewriteImg(n);
          scanAll(n);
        }
      }
    });
    obs.observe(document.documentElement, {
      childList: true, subtree: true, attributes: true, attributeFilter: ["src"]
    });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start);
  } else {
    start();
  }
})();
</script>
